# Server Configuration
server.port=8080
spring.application.name=ACPulse

# Database Configuration
spring.datasource.url=jdbc:postgresql://localhost:5432/acpulsedb
spring.datasource.username=postgres
spring.datasource.password=Joseph123
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Logging
# Show detailed error messages
logging.level.root=INFO
logging.level.com.acpulse=DEBUG
logging.level.org.springframework.web=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# Show full stack traces
server.error.include-message=always
server.error.include-stacktrace=always

# Email Configuration
# TODO: Replace with your actual email server details for email functionality to work.
spring.mail.host=smtp.example.com
spring.mail.port=587
spring.mail.username=your-email@example.com
spring.mail.password=your-email-password
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# CORS Configuration
cors.allowed-origins=http://localhost:3000,http://localhost:5173

# JWT Configuration
jwt.secret=please-change-this-secret-and-keep-32-bytes-minimum-for-hmac
jwt.expiration=86400000
