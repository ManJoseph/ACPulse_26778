# Server Configuration
server.port=8080
spring.application.name=ACPulse

# Database Configuration
spring.datasource.url=jdbc:postgresql://localhost:5432/acpulsedb
spring.datasource.username=your_databaseName
spring.datasource.password=your_password
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Logging
# Show detailed error messages
logging.level.root=INFO
logging.level.com.acpulse=DEBUG
logging.level.org.springframework.web=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# Show full stack traces
server.error.include-message=always
server.error.include-stacktrace=always

# Email Configuration (Mailtrap for Development)
# IMPORTANT: Replace placeholders below with your actual Mailtrap credentials.
# You can get them from your Mailtrap inbox -> SMTP Settings.
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=youremail@gmail.com
spring.mail.password=your_password
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

# CORS Configuration
cors.allowed-origins=http://localhost:3000,http://localhost:5173

# JWT Configuration
jwt.secret=please-change-this-secret-and-keep-32-bytes-minimum-for-hmac
jwt.expiration=86400000
