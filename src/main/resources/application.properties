# Server Configuration
server.port=8080
spring.application.name=ACPulse

# Database Configuration
spring.datasource.url=jdbc:postgresql://localhost:5432/acpulsedb
spring.datasource.username=postgres
spring.datasource.password=12345
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Email Configuration
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=josephmanizabayo7@gmail.com
spring.mail.password=Joseph123@#
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# CORS Configuration
cors.allowed-origins=http://localhost:3000

# Scheduling
spring.task.scheduling.pool.size=2

# ============================================
# JPA/Hibernate Configuration
# ============================================
# ddl-auto: Automatically creates/updates database tables based on entities
# Options: none, validate, update, create, create-drop
spring.jpa.hibernate.ddl-auto=update

# Update table naming strategy to reflect simplified schema
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl

# Database dialect: Tells Hibernate which SQL dialect to use
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Add schema update logging to track removed tables
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE


# Run this once to remove old tables, then change back to:
# spring.jpa.hibernate.ddl-auto=update

# ============================================
# Logging Configuration
# ============================================
# Log level for the application
logging.level.root=INFO
logging.level.com.acpulse=DEBUG


